<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante La Llamarada - Vilanova i la Geltrú</title>
    <style>
        :root {
            --bg-principal: #121212;
            --bg-tarjeta: #1e1e1e;
            --rojo-fuego: #d32f2f;
            --dorado-brasa: #ffb300;
            --blanco: #ffffff;
            --gris-texto: #b0bec5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--blanco);
            line-height: 1.6;
            padding-bottom: 100px;
        }

        /* LOGO PRINCIPAL EMULADO */
        .header-logo-container {
            text-align: center;
            padding: 30px 15px;
            background: linear-gradient(180deg, rgba(211,47,47,0.15) 0%, rgba(18,18,18,0) 100%);
        }

        .logo-circular {
            width: 160px;
            height: 160px;
            margin: 0 auto;
            border: 4px double var(--blanco);
            border-radius: 50%;
            position: relative;
            display: block;
            background-color: rgba(0,0,0,0.4);
            box-shadow: 0 0 20px rgba(211,47,47,0.3);
        }

        .logo-text-top {
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--blanco);
            position: absolute;
            top: 22px;
            width: 100%;
            text-align: center;
            text-transform: uppercase;
        }

        .logo-llama {
            font-size: 42px;
            position: absolute;
            top: 40px;
            left: 0;
            right: 0;
            text-align: center;
            animation: burn 1.5s infinite alternate;
        }

        @keyframes burn {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px var(--rojo-fuego)); }
            100% { transform: scale(1.08); filter: drop-shadow(0 0 15px var(--dorado-brasa)); }
        }

        .logo-marca {
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--blanco);
            position: absolute;
            top: 92px;
            width: 100%;
            text-align: center;
            border-top: 2px solid var(--blanco);
            border-bottom: 2px solid var(--blanco);
            padding: 2px 0;
            background-color: #000;
        }

        .logo-text-bottom {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: var(--gris-texto);
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
        }

        .slogan-principal {
            font-size: 14px;
            color: var(--dorado-brasa);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 15px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }

        /* SECCIONES Y CONTENEDORES */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 15px;
        }

        /* BLOQUE DE PROMOCIONES ESPECIALES (NUEVO) */
        .bloque-promocion {
            background-color: var(--bg-tarjeta);
            border: 2px solid var(--rojo-fuego);
            padding: 20px;
            margin: 20px 0;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 15px rgba(211, 47, 47, 0.4);
        }

        .promo-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            font-size: 15px;
            text-align: left;
        }

        .promo-item:last-child {
            border-bottom: none;
        }

        .promo-texto {
            font-weight: 600;
            padding-right: 10px;
        }

        .promo-precio {
            color: var(--dorado-brasa);
            font-weight: 800;
            font-size: 18px;
            white-space: nowrap;
        }

        /* SECCIÓN UBICACIÓN Y HORARIOS DESTACADOS */
        .bloque-destacado {
            background-color: var(--bg-tarjeta);
            border-left: 5px solid var(--dorado-brasa);
            border-right: 5px solid var(--dorado-brasa);
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .titulo-resaltado {
            color: var(--dorado-brasa);
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .texto-ubicacion {
            font-size: 16px;
            color: var(--blanco);
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .horario-linea {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
            font-size: 14px;
        }

        .horario-linea.cerrado {
            color: var(--rojo-fuego);
            font-weight: bold;
        }

        /* SERVICIO A DOMICILIO */
        .bloque-reparto {
            background: linear-gradient(135deg, #1e1e1e 0%, #2a1a1a 100%);
            border: 1px solid var(--rojo-fuego);
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
            text-align: center;
        }

        .zonas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
        }

            padding: 8px;
